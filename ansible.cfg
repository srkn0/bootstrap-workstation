[defaults]
inventory = inventory
roles_path = roles
stdout_callback = yaml
callbacks_enabled = profile_tasks, timer
host_key_checking = False
retry_files_enabled = False
interpreter_python = auto_silent
nocows = True
# Set this explicitly to silence the "default is deprecated" warning (the
# default flips in ansible-core 2.24). Our own tasks use ansible_facts.* and
# work either way; kept True because the vendored geerlingguy.docker role still
# references bare ansible_* vars internally.
inject_facts_as_vars = True

[ssh_connection]
pipelining = True
