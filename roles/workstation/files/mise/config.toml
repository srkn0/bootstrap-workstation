# Global mise config - the single source of truth for dev tooling + runtimes.
# Docs: https://mise.jdx.dev   |   `mise install` installs everything below.
# Per-project versions still override this via a local .mise.toml / mise.toml.
#
# Versions are pinned for reproducibility and kept current by Renovate
# (see renovate.json - it opens PRs as new releases land).

[settings]
# Treat .go-version / .nvmrc / .python-version in projects as authoritative.
idiomatic_version_file_enable_tools = ["go", "node", "python"]

[tools]
# --- language runtimes ---
go = "1.26.3"
node = "24.16.0"      # current LTS line
python = "3.14.5"
pnpm = "11.5.0"

# --- Go tooling ---
"golangci-lint" = "2.12.2"

# --- editor ---
neovim = "0.12.2"

# --- modern coreutils ---
eza = "0.23.4"
bat = "0.26.1"
fd = "10.4.2"
ripgrep = "15.1.0"
fzf = "0.73.1"

# --- shell UX ---
zoxide = "0.9.9"
atuin = "18.16.1"
"ubi:Canop/broot" = "1.56.4"  # not in mise registry; via ubi (GitHub releases)
starship = "1.25.1"
direnv = "2.37.1"

# --- dev workflow ---
lazygit = "0.62.1"
gh = "2.93.0"

# --- kubernetes / IaC ---
kubectl = "1.36.1"
kind = "0.31.0"
helm = "4.2.0"
kustomize = "5.8.1"
k9s = "0.50.18"
kubectx = "0.11.0"
terraform = "1.15.5"
