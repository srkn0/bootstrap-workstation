# Global mise config - the single source of truth for dev tooling + runtimes.
# Docs: https://mise.jdx.dev   |   `mise install` installs everything below.
# Per-project versions still override this via a local .mise.toml / mise.toml.
#
# Versions are pinned for reproducibility and kept current by Renovate
# (see renovate.json - it opens PRs as new releases land).

[settings]
# Treat .go-version / .nvmrc / .python-version in projects as authoritative.
idiomatic_version_file_enable_tools = ["go", "node", "python"]

[tools]
# --- language runtimes ---
go = "1.26.4"
node = "24.18.0"      # current LTS line
python = "3.14.6"
pnpm = "11.9.0"

# --- Go tooling ---
"golangci-lint" = "2.12.2"

# --- editor ---
neovim = "0.12.3"

# --- modern coreutils ---
eza = "0.23.4"
bat = "0.26.1"
fd = "10.4.2"
ripgrep = "15.1.0"
fzf = "0.73.1"

# --- shell UX ---
zoxide = "0.9.9"
atuin = "18.16.1"
starship = "1.26.0"
direnv = "2.37.1"
# NOTE: broot is intentionally NOT here. Its release is a single zip containing
# a per-platform subfolder, which mise's ubi/aqua backends can't disambiguate
# (they pick the wrong inner binary -> "exec format error"). It's installed by
# the dedicated tasks/broot.yml instead. See roles/workstation/tasks/broot.yml.

# --- dev workflow ---
lazygit = "0.62.2"
gh = "2.95.0"

# --- kubernetes / IaC ---
kubectl = "1.36.2"
kind = "0.32.0"
helm = "4.2.2"
kustomize = "5.8.1"
k9s = "0.51.0"
kubectx = "0.11.0"
terraform = "1.15.7"
