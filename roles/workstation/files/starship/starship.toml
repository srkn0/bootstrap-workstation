# Starship prompt - https://starship.rs/config/
# Requires a Nerd Font (installed by this role: Agave Nerd Font).

add_newline = true
command_timeout = 1000

format = """
$directory\
$git_branch$git_status\
$kubernetes\
$golang$nodejs$python$rust\
$docker_context\
$cmd_duration\
$line_break\
$character"""

[character]
success_symbol = "[❯](bold green)"
error_symbol = "[❯](bold red)"
vimcmd_symbol = "[❮](bold green)"

[directory]
truncation_length = 3
truncate_to_repo = true
style = "bold cyan"
read_only = " "

[git_branch]
symbol = " "
style = "bold purple"

[git_status]
style = "bold yellow"

[cmd_duration]
min_time = 2000
format = "took [$duration]($style) "
style = "bold yellow"

[kubernetes]
disabled = false
symbol = "☸ "
format = '[$symbol$context( \($namespace\))]($style) '
style = "bold blue"

[golang]
symbol = " "

[nodejs]
symbol = " "

[python]
symbol = " "

[rust]
symbol = " "

[docker_context]
symbol = " "
disabled = false
