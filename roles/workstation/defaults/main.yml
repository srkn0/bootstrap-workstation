---
# ---------------------------------------------------------------------------
# Feature toggles - flip any of these off, or use --tags / --skip-tags.
# ---------------------------------------------------------------------------
with_packages: true     # base apt packages
with_shell: true        # zsh + Oh My Zsh + plugins
with_brew: true         # Homebrew (linuxbrew) as an ad-hoc escape hatch
with_mise: true         # mise + all CLI tools and language runtimes
with_broot: true        # broot (installed outside mise; see tasks/broot.yml)
with_fonts: true        # Nerd Font (native: ~/.local/share/fonts; WSL: Windows)
with_kitty: true        # kitty terminal + font config (native Linux only)
with_neovim: true       # deploy the LazyVim config
with_starship: true     # deploy the Starship prompt config
with_dotfiles: true     # .zshrc, .tmux.conf, atuin config
with_docker: true       # Docker engine via geerlingguy.docker

# Run a headless LazyVim plugin sync during the play. Off by default: the first
# interactive `nvim` launch installs plugins, and a headless sync slows CI.
nvim_sync: false

# Patch the existing Windows Terminal settings.json to use the Nerd Font (WSL only).
wt_set_font: true

# ---------------------------------------------------------------------------
# broot (not available via mise - see tasks/broot.yml). Kept current by Renovate.
# ---------------------------------------------------------------------------
broot_version: "1.57.0"
broot_url: "https://github.com/Canop/broot/releases/download/v{{ broot_version }}/broot_{{ broot_version }}.zip"

# ---------------------------------------------------------------------------
# Nerd Font (var-driven so it's trivially swappable)
# ---------------------------------------------------------------------------
nerd_font: "Agave"
nerd_font_face: "Agave Nerd Font"
nerd_font_version: "v3.4.0"
nerd_font_url: "https://github.com/ryanoasis/nerd-fonts/releases/download/{{ nerd_font_version }}/{{ nerd_font }}.zip"

# Point size used by terminal configs (kitty, Windows Terminal).
terminal_font_size: 11

# ---------------------------------------------------------------------------
# Oh My Zsh custom plugins (cloned into ~/.oh-my-zsh/custom/plugins)
# ---------------------------------------------------------------------------
omz_plugins:
  - name: zsh-autosuggestions
    repo: https://github.com/zsh-users/zsh-autosuggestions
  - name: zsh-completions
    repo: https://github.com/zsh-users/zsh-completions
  - name: zsh-syntax-highlighting
    repo: https://github.com/zsh-users/zsh-syntax-highlighting.git
  - name: autoupdate
    repo: https://github.com/TamCore/autoupdate-oh-my-zsh-plugins

# mise global config destination
mise_config_target: "{{ ansible_facts.env.HOME }}/.config/mise/config.toml"
