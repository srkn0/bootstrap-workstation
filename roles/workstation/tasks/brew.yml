---
- name: Check whether Homebrew is installed
  ansible.builtin.stat:
    path: /home/linuxbrew/.linuxbrew/bin/brew
  register: brew_bin

- name: Pre-create /home/linuxbrew owned by the user (enables sudo-less install)
  become: true
  ansible.builtin.file:
    path: /home/linuxbrew
    state: directory
    owner: "{{ ansible_facts.user_id }}"
    group: "{{ ansible_facts.user_id }}"
    mode: "0755"
  when:
    - not brew_bin.stat.exists
    - ansible_facts.user_id != 'root'

- name: Install Homebrew (non-interactive)
  ansible.builtin.shell: |
    set -o pipefail
    NONINTERACTIVE=1 /bin/bash -c \
      "$(curl -fsSL https://raw.githubusercontent.com/Homebrew/install/HEAD/install.sh)"
  args:
    executable: /bin/bash
    creates: /home/linuxbrew/.linuxbrew/bin/brew
  environment:
    NONINTERACTIVE: "1"
  when:
    - not brew_bin.stat.exists
    - ansible_facts.user_id != 'root'
