---
- name: Ensure Neovim config directory exists
  ansible.builtin.file:
    path: "{{ ansible_facts.env.HOME }}/.config/nvim"
    state: directory
    mode: "0755"

- name: Deploy Neovim (LazyVim) config
  ansible.builtin.copy:
    src: nvim/
    dest: "{{ ansible_facts.env.HOME }}/.config/nvim/"
    mode: preserve

- name: Sync LazyVim plugins headlessly (optional)
  ansible.builtin.command: mise exec neovim -- nvim --headless "+Lazy! sync" +qa
  args:
    creates: "{{ ansible_facts.env.HOME }}/.local/share/nvim/lazy/lazy.nvim"
  changed_when: true
  failed_when: false
  when: nvim_sync | bool
