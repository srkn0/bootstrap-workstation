---
# Native Linux only. On WSL the terminal is Windows Terminal (see windows.yml),
# so kitty is skipped there.

- name: Install kitty terminal
  become: true
  ansible.builtin.apt:
    name: kitty
    state: present

- name: Ensure kitty config directory exists
  ansible.builtin.file:
    path: "{{ ansible_facts.env.HOME }}/.config/kitty"
    state: directory
    mode: "0755"

- name: Deploy kitty config (sets the Nerd Font)
  ansible.builtin.template:
    src: kitty.conf.j2
    dest: "{{ ansible_facts.env.HOME }}/.config/kitty/kitty.conf"
    mode: "0644"
