---
- name: Install Docker engine (geerlingguy.docker)
  ansible.builtin.include_role:
    name: geerlingguy.docker
    apply:
      become: true
  vars:
    # Only manage the daemon where systemd is PID 1 (e.g. not WSL without systemd).
    docker_service_manage: "{{ ansible_facts.service_mgr == 'systemd' }}"
    docker_users:
      - "{{ ansible_facts.user_id }}"
